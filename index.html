<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Timeweb AI Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000; /* фон для Teams dark */
    }

    /* Контейнер на весь экран */
    #tw-root {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Делает окно виджета полноэкранным */
    .timeweb-agent-chat {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>
  <div id="tw-root"></div>

  <!-- embed-скрипт агента -->
  <script async src="https://timeweb.cloud/api/v1/cloud-ai/agents/58ca2bd7-4157-4445-ab50-6b92360563eb/embed.js?collapsed=true"></script>

  <script>
    // Ждём появления кнопки виджета и открываем чат программно
    function openTimewebChat() {
      const toggle =
        document.querySelector('.timeweb-agent-chat button') ||
        document.querySelector('[data-tw-toggle]') ||
        document.querySelector('.tw-floating-toggle');

      if (toggle) {
        toggle.click(); // открываем свернутый виджет
        return true;
      }
      return false;
    }

    // Периодически пытаемся найти и открыть виджет после загрузки страницы
    let attempts = 0;
    const maxAttempts = 20;

    const timer = setInterval(() => {
      attempts++;
      if (openTimewebChat() || attempts >= maxAttempts) {
        clearInterval(timer);
      }
    }, 500); // каждые 500 мс, пока не откроется
  </script>
</body>
</html>
