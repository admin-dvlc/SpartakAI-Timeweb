<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Timeweb AI Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Растягиваем окно виджета на всю вкладку */
    .agent-chat-widget {
      position: fixed !important;
      inset: 0 !important;          /* top:0; right:0; bottom:0; left:0 */
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    /* Убираем плавающую кнопку, чтобы не мешалась */
    .agent-chat-widget .floating-button-container,
    .agent-chat-widget .floating-button {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- embed-скрипт агента -->
  <script async src="https://timeweb.cloud/api/v1/cloud-ai/agents/58ca2bd7-4157-4445-ab50-6b92360563eb/embed.js?collapsed=true"></script>

  <script>
    // Ждём появления контейнера и принудительно открываем чат
    function openChatFullscreen() {
      const widget = document.querySelector('.agent-chat-widget');
      if (!widget) return false;

      // снимаем флаг is-closed и ставим is-open / isFullscreen
      widget.classList.remove('is-closed');
      widget.classList.add('is-open');
      widget.dataset.widgetState = JSON.stringify({
        open: true,
        isFullscreen: true,
        isMenuOpen: false,
        isConnected: true,
        isDragging: false,
        isResizing: false,
        hasCustomPosition: true
      });

      return true;
    }

    let attempts = 0;
    const maxAttempts = 30;

    const timer = setInterval(() => {
      attempts++;
      if (openChatFullscreen() || attempts >= maxAttempts) {
        clearInterval(timer);
      }
    }, 500);
  </script>
</body>
</html>
