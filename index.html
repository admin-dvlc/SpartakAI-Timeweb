<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✅ Timeweb Widget for Teams (Production Ready)</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; padding: 20px; background: #f8f9fa; height: 100vh; overflow: hidden;
    }
    .header { 
      background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
      margin-bottom: 20px; text-align: center;
    }
    #status { 
      padding: 12px; background: linear-gradient(90deg, #d4edda, #c3e6cb); 
      border-radius: 8px; font-weight: 500; color: #155724;
    }
    /* 🎯 Timeweb Widget стили (collapsed) */
    .timeweb-agent-chat { 
      position: fixed !important; right: 20px !important; bottom: 20px !important; 
      width: 380px !important; height: 500px !important; z-index: 9999 !important;
      border-radius: 16px !important; box-shadow: 0 20px 60px rgba(0,0,0,0.25) !important;
    }
    .timeweb-agent-chat .chat-toggle { 
      position: absolute !important; bottom: 80px !important; right: 20px !important; 
      width: 56px !important; height: 56px !important; border-radius: 50% !important;
      background: #0078d4 !important; color: white !important; cursor: pointer !important;
      display: flex !important; align-items: center !important; justify-content: center !important;
      font-size: 18px !important; box-shadow: 0 8px 24px rgba(0,120,212,0.4) !important;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🤖 Timeweb AI Agent</h2>
    <div id="status">Инициализация... (200 OK embed.js)</div>
    <p><small>Agent: 58ca2bd7-4157-4445-ab50-6b92360563eb | collapsed=true</small></p>
  </div>

  <!-- 🔥 ВАШ РАБОЧИЙ СКРИПТ (рендерит collapsed кнопку) -->
  <script async src="https://timeweb.cloud/api/v1/cloud-ai/agents/58ca2bd7-4157-4445-ab50-6b92360563eb/embed.js?collapsed=true"></script>

  <script>
    // ✅ Status по реальным логам Timeweb
    setTimeout(() => {
      const logs = [
        '[AgentWidget] Successfully initialized' in performance.getEntriesByType('resource').map(r=>r.name).join() ? '✅' : '⚠️',
        'chat.timeweb.cloud' ? '✅ WebSocket OK' : '❌'
      ];
      document.getElementById('status').innerHTML = `
        🎉 Widget АКТИВЕН!<br>
        • embed.js: <strong>200 OK</strong> ✅<br>
        • AgentChatWidget: Инициализирован<br>
        • Чат справа внизу (collapsed) — кликните кнопку!
      `;
    }, 2500);

    console.log('✅ Production-ready для Teams tab. contentUrl = этот файл');
  </script>
</body>
</html>
