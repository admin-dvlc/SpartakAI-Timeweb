<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Timeweb AI Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0b0b0b; /* тёмный фон под виджетом */
    }
    #tw-root {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    /* Переопределяем плавающий режим Timeweb под “full screen” */
    .timeweb-agent-chat {
      position: fixed !important;
      inset: 0 !important;       /* top:0; right:0; bottom:0; left:0 */
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    .timeweb-agent-chat button,
    .timeweb-agent-chat [data-tw-toggle],
    .timeweb-agent-chat .tw-floating-toggle {
      display: none !important; /* скрываем плавающую кнопку */
    }
  </style>
</head>
<body>
  <!-- Корневой контейнер, чтобы виджет был над всей страницей -->
  <div id="tw-root"></div>

  <!-- Чистый embed-скрипт вашего агента -->
  <script async src="https://timeweb.cloud/api/v1/cloud-ai/agents/58ca2bd7-4157-4445-ab50-6b92360563eb/embed.js?collapsed=false"></script>

  <script>
    // Мини-проверка, что скрипт загрузился
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!document.querySelector('.timeweb-agent-chat')) {
          console.warn('Timeweb widget not found — проверьте домены в панели Timeweb.');
        }
      }, 3000);
    });
  </script>
</body>
</html>
