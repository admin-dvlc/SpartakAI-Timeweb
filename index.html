<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Timeweb AI Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    .agent-chat-widget {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .agent-chat-widget .floating-button-container,
    .agent-chat-widget .floating-button {
      display: none !important;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .error {
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 40px;
    }

    .error a {
      color: #4ea3ff;
    }
  </style>

  <script
    src="https://res.cdn.office.net/teams-js/2.30.0/js/MicrosoftTeams.min.js"
    crossorigin="anonymous">
  </script>
</head>
<body>
  <div id="status"></div>

  <script>
    const EXPECTED_TENANT_ID = "eddab487-208e-4c81-b05f-b92089363722";

    function setStatus(text) {
      const el = document.getElementById("status");
      if (el) el.textContent = text || "";
    }

    function openChatFullscreen() {
      const widget = document.querySelector(".agent-chat-widget");
      if (!widget) return false;

      widget.classList.remove("is-closed");
      widget.classList.add("is-open");
      widget.dataset.widgetState = JSON.stringify({
        open: true,
        isFullscreen: true,
        isMenuOpen: false,
        isConnected: true,
        isDragging: false,
        isResizing: false,
        hasCustomPosition: true
      });

      return true;
    }

    function initFullscreenPoll() {
      let attempts = 0;
      const maxAttempts = 30;

      const timer = setInterval(() => {
        attempts++;
        if (openChatFullscreen() || attempts >= maxAttempts) {
          clearInterval(timer);
        }
      }, 500);
    }

    function loadTimewebWidget() {
      if (document.getElementById("timeweb-embed-script")) return;

      const s = document.createElement("script");
      s.id = "timeweb-embed-script";
      s.async = true;
      s.src = "https://timeweb.cloud/api/v1/cloud-ai/agents/58ca2bd7-4157-4445-ab50-6b92360563eb/embed.js?collapsed=true";
      s.onload = () => {
        setStatus("");
        initFullscreenPoll();
      };
      s.onerror = () => {
        setStatus("Ошибка загрузки Timeweb-виджета");
      };
      document.body.appendChild(s);
    }

    function showTeamsOnlyError() {
      document.body.innerHTML = `
        <div class="error">
          <h2>Доступ только из Microsoft Teams</h2>
          <p>Этот путь предназначен для вкладки Teams и не должен открываться напрямую.</p>
          <p><a href="/">Перейти на главную страницу</a></p>
        </div>`;
    }

    async function initTeamsAuthPopup() {
      const inIframe = window.self !== window.top;
      if (!window.microsoftTeams || !microsoftTeams.app || !inIframe) {
        showTeamsOnlyError();
        return;
      }

      await microsoftTeams.app.initialize();

      microsoftTeams.authentication.authenticate({
        url: "https://salmon-tree-07b523a03.2.azurestaticapps.net/auth-start.html",
        width: 600,
        height: 535,
        successCallback: (accessToken) => {
          // На этом шаге считаем, что Teams/Entra уже сделали всё нужное
          setStatus("Teams auth OK");
          loadTimewebWidget();
        },
//         successCallback: (accessToken) => {
//          try {
//            // Если токен не похож на JWT (нет 3 частей), не декодируем, просто пускаем
//            if (!accessToken || accessToken.split(".").length !== 3) {
//               setStatus("Teams auth OK (non-JWT token)");
//               loadTimewebWidget();
//               return;
//         }

//         const parts = accessToken.split(".");
//         const payloadPart = parts[1];
//         const padded = payloadPart.padEnd(
//           payloadPart.length + (4 - payloadPart.length % 4) % 4,
//           "="
//        );
//        const payload = JSON.parse(atob(padded));

//        const tid = payload.tid;
//        const upn = payload.preferred_username || payload.upn;

//        if (tid && tid !== EXPECTED_TENANT_ID) {
//          document.body.innerHTML =
//            "<h3 style='color:white;font-family:sans-serif'>Access denied: wrong tenant</h3>";
//          return;
//     }

//     setStatus("Teams auth OK: " + (upn || "user"));
//     loadTimewebWidget();
//   } catch (e) {
//     document.body.innerHTML =
//       "<h3 style='color:white;font-family:sans-serif'>Ошибка обработки токена</h3>";
//   }
// },
        failureCallback: (reason) => {
          document.body.innerHTML =
            "<div class='error'><h2>Auth failed</h2><pre style='white-space:pre-wrap;color:#4ea3ff'>" +
            (reason || "unknown") +
            "</pre></div>";
        }
      });
    }

    const currentOrigin = window.location.origin || "";
    setStatus("Origin: " + currentOrigin);

    if (location.pathname.startsWith("/teams")) {
      initTeamsAuthPopup();
    } else {
      setStatus("Origin: " + currentOrigin + "\nAAD auth через SWA, загружаем виджет...");
      loadTimewebWidget();
    }
  </script>
</body>
</html>
