<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Timeweb AI Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Растягиваем окно виджета на всю вкладку */
    .agent-chat-widget {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    /* Убираем плавающую кнопку, чтобы не мешалась */
    .agent-chat-widget .floating-button-container,
    .agent-chat-widget .floating-button {
      display: none !important;
    }

    /* Контейнер для статуса/отладочных сообщений */
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
  </style>

  <!-- Teams JS SDK v2 (рабочий URL с CDN Microsoft) -->
  <script
    src="https://res.cdn.office.net/teams-js/2.30.0/js/MicrosoftTeams.min.js"
    integrity="sha384-8I0Bv4bWDPSX5ZYhJcChnvrBNoieX3zASTxmZ9URwnjEVx70hsrN0ZUy/C46u8dw"
    crossorigin="anonymous">
  </script>
</head>
<body>
  <div id="status"></div>

  <script>
    const EXPECTED_TENANT_ID = "eddab487-208e-4c81-b05f-b92089363722";

    function setStatus(text) {
      const el = document.getElementById("status");
      if (el) el.textContent = text || "";
    }

    // Разворачиваем виджет на весь экран
    function openChatFullscreen() {
      const widget = document.querySelector('.agent-chat-widget');
      if (!widget) return false;

      widget.classList.remove('is-closed');
      widget.classList.add('is-open');
      widget.dataset.widgetState = JSON.stringify({
        open: true,
        isFullscreen: true,
        isMenuOpen: false,
        isConnected: true,
        isDragging: false,
        isResizing: false,
        hasCustomPosition: true
      });

      return true;
    }

    function initFullscreenPoll() {
      let attempts = 0;
      const maxAttempts = 30;

      const timer = setInterval(() => {
        attempts++;
        if (openChatFullscreen() || attempts >= maxAttempts) {
          clearInterval(timer);
        }
      }, 500);
    }

    // Подключаем embed Timeweb только после успешного доступа
    function loadTimewebWidget() {
      if (document.getElementById("timeweb-embed-script")) {
        return; // уже загружен
      }

      const s = document.createElement("script");
      s.id = "timeweb-embed-script";
      s.async = true;
      s.src = "https://timeweb.cloud/api/v1/cloud-ai/agents/58ca2bd7-4157-4445-ab50-6b92360563eb/embed.js?collapsed=true";
      s.onload = () => {
        setStatus("");
        initFullscreenPoll();
      };
      s.onerror = () => {
        setStatus("Ошибка загрузки Timeweb-виджета");
      };
      document.body.appendChild(s);
    }

    // SSO во вкладке Teams (маршрут /teams)
    async function initTeamsSso() {
      // если SDK не подцепился вообще
      if (!window.microsoftTeams || !microsoftTeams.app) {
        setStatus("Открыто вне Teams (нет SDK), загружаем виджет");
        loadTimewebWidget();
        return;
      }

      try {
        await microsoftTeams.app.initialize();

        // необязательно, но полезно для отладки
        try {
          const context = await microsoftTeams.app.getContext();
          console.log("Teams context:", context);
        } catch (ctxErr) {
          console.warn("Cannot get Teams context:", ctxErr);
        }

        microsoftTeams.authentication.getAuthToken({
          successCallback: (token) => {
            try {
              const payload = JSON.parse(atob(token.split('.')[1]));
              const tid = payload.tid;
              const upn = payload.preferred_username || payload.upn;

              console.log("Teams SSO user:", upn, "tenant:", tid);

              if (tid !== EXPECTED_TENANT_ID) {
                document.body.innerHTML =
                  "<h3 style='color:white;font-family:sans-serif'>Access denied: wrong tenant</h3>";
                return;
              }

              setStatus("Teams SSO OK: " + upn);
              loadTimewebWidget();
            } catch (e) {
              console.error("Failed to parse SSO token:", e);
              setStatus("Ошибка обработки SSO токена");
              loadTimewebWidget(); // чтобы совсем не оставлять пустой экран
            }
          },
          failureCallback: (error) => {
            console.error("Failed to get SSO token:", error);
            setStatus("Не удалось пройти аутентификацию в Teams");
          }
        });
      } catch (e) {
        console.error("Teams SDK init failed:", e);
        // Если упали при инициализации (например, /teams открыт напрямую в браузере),
        // считаем, что это не окно Teams, и просто загружаем виджет
        setStatus("Не похоже на окно Teams, загружаем виджет без SSO");
        loadTimewebWidget();
      }
    }

    // Точка входа
    if (location.pathname.startsWith("/teams")) {
      setStatus("Инициализация Teams SSO...");
      initTeamsSso();
    } else {
      setStatus("AAD auth через SWA, загружаем виджет...");
      loadTimewebWidget();
    }
  </script>
</body>
</html>
