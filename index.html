<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Timeweb AI Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Растягиваем окно виджета на всю вкладку */
    .agent-chat-widget {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    /* Убираем плавающую кнопку, чтобы не мешалась */
    .agent-chat-widget .floating-button-container,
    .agent-chat-widget .floating-button {
      display: none !important;
    }

    /* Простейший контейнер для статуса/ошибок */
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
  </style>

  <!-- Teams JS SDK для SSO во вкладке -->
  <script src="https://res.cdn.office.net/teams-js/v2.11.0/js/MicrosoftTeams.min.js"></script>
</head>
<body>
  <div id="status"></div>

  <!-- embed-скрипт агента будет добавляться динамически после проверки доступа -->

  <script>
    const EXPECTED_TENANT_ID = "eddab487-208e-4c81-b05f-b92089363722";

    function setStatus(text) {
      const el = document.getElementById("status");
      if (el) el.textContent = text;
    }

    // Твой оригинальный код для разворота виджета на весь экран
    function openChatFullscreen() {
      const widget = document.querySelector('.agent-chat-widget');
      if (!widget) return false;

      widget.classList.remove('is-closed');
      widget.classList.add('is-open');
      widget.dataset.widgetState = JSON.stringify({
        open: true,
        isFullscreen: true,
        isMenuOpen: false,
        isConnected: true,
        isDragging: false,
        isResizing: false,
        hasCustomPosition: true
      });

      return true;
    }

    function initFullscreenPoll() {
      let attempts = 0;
      const maxAttempts = 30;

      const timer = setInterval(() => {
        attempts++;
        if (openChatFullscreen() || attempts >= maxAttempts) {
          clearInterval(timer);
        }
      }, 500);
    }

    // Функция, которая реально подключает embed Timeweb
    function loadTimewebWidget() {
      if (document.getElementById("timeweb-embed-script")) {
        return; // уже загружен
      }

      const s = document.createElement("script");
      s.id = "timeweb-embed-script";
      s.async = true;
      s.src = "https://timeweb.cloud/api/v1/cloud-ai/agents/58ca2bd7-4157-4445-ab50-6b92360563eb/embed.js?collapsed=true";
      s.onload = () => {
        setStatus(""); // очищаем статус
        initFullscreenPoll();
      };
      s.onerror = () => {
        setStatus("Ошибка загрузки Timeweb-виджета");
      };
      document.body.appendChild(s);
    }

    // SSO для Teams – вызываем только на маршруте /teams
    async function initTeamsSso() {
      if (!window.microsoftTeams) {
        // На всякий случай – если вдруг /teams откроют не в Teams
        setStatus("Открыто вне Teams, SSO недоступен");
        loadTimewebWidget(); // всё равно грузим виджет
        return;
      }

      try {
        await microsoftTeams.app.initialize();

        microsoftTeams.authentication.getAuthToken({
          successCallback: (token) => {
            try {
              const payload = JSON.parse(atob(token.split('.')[1]));
              const tid = payload.tid;
              const upn = payload.preferred_username || payload.upn;

              console.log("Teams SSO user:", upn, "tenant:", tid);

              if (tid !== EXPECTED_TENANT_ID) {
                document.body.innerHTML = "<h3 style='color:white;font-family:sans-serif'>Access denied: wrong tenant</h3>";
                return;
              }

              setStatus("Teams SSO OK: " + upn);
              loadTimewebWidget();
            } catch (e) {
              console.error("Failed to parse SSO token:", e);
              setStatus("Ошибка обработки SSO токена");
            }
          },
          failureCallback: (error) => {
            console.error("Failed to get SSO token:", error);
            setStatus("Не удалось пройти аутентификацию в Teams");
          }
        });
      } catch (e) {
        console.error("Teams SDK init failed:", e);
        setStatus("Ошибка инициализации Teams SDK");
      }
    }

    // Точка входа
    if (location.pathname.startsWith("/teams")) {
      // Вкладка Teams: проверяем SSO и tenant, потом грузим виджет
      setStatus("Инициализация Teams SSO...");
      initTeamsSso();
    } else {
      // Прямой заход по URL: SWA уже проверил AAD и пустил только свой тенант
      setStatus("AAD auth через SWA, загружаем виджет...");
      loadTimewebWidget();
    }
  </script>
</body>
</html>
